<!DOCTYPE html>
<html lang="en">
<head>
    <meta http-equiv="Content-Security-Policy" content="script-src 'self';">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KeyTroupee App</title>
    <link rel="stylesheet" href="../style/typing.css">
    <script defer src="../js/typing.js"></script>
</head>
<body>
    <nav id="navbar">
        <div id="logo">
            <img src="../img/KeyTroupee logo.jpg" alt="Image not available">
        </div>
        <ul>
            <li class="item"><a href="../tempelate/Home.html">Home</a></li>
            <li class="item"><a href="../tempelate/Login.html">Login</a></li>
            <li class="item"><a href="../tempelate/typing.html">Typing</a></li>
            <li class="item"><a href="../tempelate/piano.html">Piano Play</a></li>
            <li class="item"><a href="../tempelate/Profile.html">Profile</a></li>
            <li class="item"><a href="../tempelate/Register.html">Register</a></li>
            <li class="item"><button id="typingLogoutBtn" type="button">Logout</button></li>
        </ul>
    </nav>

    <section>
        <div id="typing-master">
            <h1>KeyTroupee Typing</h1>

            <div id="difficulty-buttons">
                <button class="difficulty-btn" data-level="easy">Easy</button>
                <button class="difficulty-btn" data-level="medium">Medium</button>
                <button class="difficulty-btn" data-level="hard">Hard</button>
            </div>

            <button id="startBtn" class="start-btn" disabled>Start Typing</button>
            <div id="text-display">Select a difficulty and start typing!</div>
            <input id="typing-input" type="text" placeholder="Start typing here..." disabled
                autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">

            <div id="stats">
                <div class="stat-box" id="wpm">WPM: 0</div>
                <div class="stat-box" id="accuracy">Accuracy: 100%</div>
                <div class="stat-box" id="mistakes">Mistakes: 0</div>
            </div>

            <div id="results" class="results hidden">
                <h2>Results</h2>
                <div id="result-summary"></div>
                <div id="typed-output-wrap">
                    <h3>What you typed</h3>
                    <p class="typed-hint">Your full typing pattern, including mistakes. A "&lt;" marks a backspace you used to correct a wrong letter.</p>
                    <p id="typed-output"></p>
                </div>
                <div id="remarks"></div>
            </div>
        </div>
        <div>
            <button id="saveBtn" class="save-btn">Save Progress</button>
        </div>
    </section>
</body>
</html>
